<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RN Paper White-Label Theme PoC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      /* Rendered documentation panel */
      .doc-content {
        color: #1f2430;
        font-size: 14px;
        line-height: 1.6;
      }
      .doc-content h1 {
        font-size: 24px;
        margin: 0 0 8px;
      }
      .doc-content h2 {
        font-size: 19px;
        margin: 28px 0 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid #e5e7eb;
      }
      .doc-content h3 {
        font-size: 16px;
        margin: 20px 0 8px;
      }
      .doc-content p {
        margin: 10px 0;
      }
      .doc-content a {
        color: #00529d;
      }
      .doc-content ul,
      .doc-content ol {
        padding-left: 22px;
        margin: 10px 0;
      }
      .doc-content code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12.5px;
        background: #f0f1f4;
        padding: 1px 5px;
        border-radius: 4px;
      }
      .doc-content pre {
        background: #1e2430;
        color: #e6e6e6;
        padding: 14px 16px;
        border-radius: 8px;
        overflow: auto;
      }
      .doc-content pre code {
        background: none;
        color: inherit;
        padding: 0;
        font-size: 12.5px;
      }
      .doc-content table {
        border-collapse: collapse;
        width: 100%;
        margin: 12px 0;
        font-size: 13px;
      }
      .doc-content th,
      .doc-content td {
        border: 1px solid #e5e7eb;
        padding: 7px 10px;
        text-align: left;
        vertical-align: top;
      }
      .doc-content th {
        background: #f7f8fa;
      }
      .doc-content blockquote {
        margin: 12px 0;
        padding: 8px 14px;
        border-left: 4px solid #00529d;
        background: #f3f6fb;
        color: #374151;
      }
      .doc-content hr {
        border: none;
        border-top: 1px solid #e5e7eb;
        margin: 24px 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
